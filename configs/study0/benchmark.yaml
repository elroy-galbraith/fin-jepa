# Study 0 Benchmark experiment config (Hydra)

defaults:
  - _self_

experiment: benchmark
study: study0

data:
  raw_dir: data/raw
  processed_dir: data/processed
  splits_dir: data/splits
  split:
    train_end: "2017-12-31"
    val_end:   "2019-12-31"
    test_end:  "2023-12-31"

features:
  use_raw: true
  use_ratios: true
  use_yoy: true
  use_sic: true
  use_missingness_flags: true
  coverage_threshold: 0.50
  winsorize_limits: [0.01, 0.99]
  normalization_method: "quantile"   # "quantile" or "zscore"
  median_impute: true

outcomes:
  - stock_decline
  - earnings_restate
  - audit_qualification
  - sec_enforcement
  - bankruptcy

labels:
  decline_threshold: -0.20
  treat_delisted_as_decline: true
  restatement_source: "edgar_amendments"
  audit_qualification_source: "external_csv"
  sec_enforcement_source: "external_csv"
  bankruptcy_source: "external_csv"       # was "compustat"; revert if Compustat subscription added
  external_label_dir: "data/raw/labels"
  horizon_days: 365

ft_transformer:
  d_token: 192
  n_heads: 8
  n_layers: 3
  d_ffn_factor: 4
  dropout: 0.0
  n_outputs: 1

xgboost:
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8

logistic_regression:
  C: 1.0
  max_iter: 1000

gbt:
  max_iter: 500
  learning_rate: 0.05
  max_depth: 6
  min_samples_leaf: 20

baselines:
  tune: true               # Optuna temporal CV tuning (30 trials, 3-fold expanding-window)
  n_trials: 30
  n_cv_splits: 3
  xgboost_search:
    n_estimators: {type: int, low: 100, high: 1000}
    learning_rate: {type: float, low: 0.01, high: 0.3, log: true}
    max_depth: {type: int, low: 3, high: 10}
    subsample: {type: float, low: 0.5, high: 1.0}
    colsample_bytree: {type: float, low: 0.5, high: 1.0}
  gbt_search:
    max_iter: {type: int, low: 100, high: 1000}
    learning_rate: {type: float, low: 0.01, high: 0.3, log: true}
    max_depth: {type: int, low: 3, high: 10}
    min_samples_leaf: {type: int, low: 10, high: 50}
  lr_search:
    C: {type: float, low: 0.001, high: 100.0, log: true}

ft_transformer_search:
  learning_rate: {type: float, low: 3.0e-5, high: 1.0e-3, log: true}
  n_layers: {type: categorical, choices: [2, 3, 4]}
  d_token: {type: categorical, choices: [128, 192, 256]}

training:
  batch_size: 256
  epochs: 100
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  patience: 10       # early stopping patience (epochs)
  seed: 42
  seeds: [42, 123, 456]  # random seeds for multi-seed FT-Transformer variance estimation

rolling_split:
  first_train_end: "2014-12-31"
  val_window_years: 1
  test_window_years: 2
  step_years: 1
  last_test_end: "2023-12-31"

gate:
  min_wins: 3        # FT-Transformer must win >= 3/5 outcomes
  auroc_margin: 0.01 # by at least this AUROC margin

results_dir: results/study0
